name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --release --target ${{ matrix.target }}
      - name: package binary and checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp README.md dist/
          cp target/${{ matrix.target }}/release/asana-cli dist/
          archive="asana-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -C dist -czf "$archive" README.md asana-cli
          shasum -a 256 "$archive" > "$archive.sha256"
      - name: upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            asana-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            asana-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
